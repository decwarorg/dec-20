set console wru=034
set cpu 1024k kl10b
set log -n instan.log
set tua rh20
set rpa rh20
set rpb rh20
set rpa0 rp06
set rpb1 rp06
set cty rsx20
at tua -f e11 BB-5254D-BM.tap
at rpa0 dskan/dsk0.rp06
at rpb1 dskan/dsk1.rp06
load -c -b bts/mtboot.exb

expect "MTBOOT >" send "/l\r"; continue
expect "MTBOOT >" send "/g143\r"; continue
expect "DO YOU WANT TO REPLACE THE FILE SYSTEM ON THE PUBLIC STRUCTURE?"  send -t delay=10000 "N\r"; continue
expect "RECONSTRUCT ROOT-DIRECTORY?" send -t delay=100000 "N\r"; continue
expect "REBUILD BIT TABLE?" send -t delay=100000 "N\r"; continue
expect "NO SYSJOB" send -t after=1000000 "\3"; continue
cont
