set console wru=034
set cpu 1024k kl10a
;set log -n change.log
set tua rh20
set rpa rh20
set rpb rh20
set rpa0 rp06
set rpb1 rp06
set cty rsx20
at tua -f e11 t20-v41-install.tap
at rpa0 -n dsk/dsk0.rp06
at rpb1 -n dsk/dsk1.rp06
load -c -b bts/mtboot.exb
expect "MTBOOT >" send "/l\r"; continue
expect "MTBOOT >" send "/g143\r"; continue
expect "DO YOU WANT TO REPLACE THE FILE SYSTEM ON THE PUBLIC STRUCTURE?"  send -t delay=10000 "Y\r"; continue
expect "DO YOU WANT TO DEFINE THE PUBLIC STRUCTURE?" send -t delay=100000 "Y\r"; continue
expect "HOW MANY PACKS ARE IN THIS STRUCTURE:" send -t delay=100000 "2\r"; continue
expect "ON WHICH \"CHANNEL,UNIT\" IS LOGICAL PACK # 0 MOUNTED:" send -t delay=100000 "0,0\r"; continue
expect "ON WHICH \"CHANNEL,UNIT\" IS LOGICAL PACK # 1 MOUNTED:" send -t delay=100000 "1,1\r"; continue
expect "DO YOU WANT THE DEFAULT SWAPPING SPACE?" send -t after=10000 delay=100000  "Y\r"; continue
expect "DO YOU WANT THE DEFAULT SIZE FRONT END FILE SYSTEM?" send -t after=10000 delay=100000  "Y\r"; continue
expect "DO YOU WANT THE DEFAULT SIZE BOOTSTRAP AREA?" send -t after=10000 delay=100000 "Y\r"; continue
expect "DO YOU WANT TO WRITE A SET OF PROTOTYPE BAT BLOCKS?" send -t after=100000 delay=100000 "Y\r"; continue
expect "DO YOU WANT TO WRITE A SET OF PROTOTYPE BAT BLOCKS?" send -t after=100000 delay=100000 "Y\r"; continue
expect "NO SYSJOB" send -t after=1000000 "\3"; continue
expect "MX>" send "G"; continue
expect "ET FILE" send "MTA0:\r"; continue
expect "MX>" send "G"; continue
expect "ET FILE" send "MTA0:\r"; continue
expect "MX>" send "S\r"; continue
expect "@" send "ENABLE\33"; continue
expect "(CAPABILITIES)" send "\r"; continue

expect "$" send "run\33"; continue
expect "(PROGRAM)" send "mta0:\r"; continue
expect "DLUSER>" send "load\33"; continue
expect "(FROM FILE)" send "mta0:\r"; continue
expect "DLUSER>" send "exit\r"; continue

expect "$" send "run\33"; continue
expect "(PROGRAM)" send "mta0:\r"; continue
expect "DUMPER>" at tua t20an-v4-files.tap ; send "TAPE MTA0:\r"; continue
expect "DUMPER>" send "supersede always\r"; continue
expect "DUMPER>" send "rewind\r"; continue
expect "DUMPER>" send "restore ps:<system>*.*.* <system>*.*.*\r"; continue
expect "DUMPER>" send "restore ps:<subsys>*.*.* <subsys>*.*.*\r"; continue


cont
